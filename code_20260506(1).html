<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密码登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-box {
            width: 100%;
            max-width: 400px;
            background: #fff;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            text-align: center;
        }
        .login-title {
            font-size: 28px;
            color: #333;
            margin-bottom: 30px;
        }
        .input-item {
            margin-bottom: 25px;
        }
        .input-item input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: 0.3s;
        }
        .input-item input:focus {
            outline: none;
            border-color: #667eea;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 17px;
            cursor: pointer;
            transition: 0.3s;
        }
        .login-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2 class="login-title">网站访问密码</h2>
        <div class="input-item">
            <!-- 绑定回车事件 -->
            <input type="password" id="pwd" placeholder="请输入密码" onkeydown="enterLogin(event)">
        </div>
        <button class="login-btn" onclick="checkPwd()">立即进入</button>
    </div>

    <script>
        // 在这里修改登录密码
        const realPwd = "888888";

        // 点击按钮验证密码
        function checkPwd() {
            let inputPwd = document.getElementById('pwd').value.trim();
            if (inputPwd === "") {
                alert("请输入访问密码！");
                return;
            }
            if (inputPwd === realPwd) {
                // 密码正确跳转你的网址
                window.location.href = "index.html";
            } else {
                alert("密码错误，请重新输入！");
                // 清空输入框
                document.getElementById('pwd').value = "";
            }
        }

        // 回车键登录
        function enterLogin(e) {
            if (e.keyCode === 13) {
                checkPwd();
            }
        }
    </script>
</body>
</html>
